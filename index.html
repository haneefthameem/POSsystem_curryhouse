<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curry House POS — Order</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── CATEGORY TABS ── */
    .cat-tabs {
      display: flex; gap: 6px; flex-wrap: wrap;
      padding: 18px 20px 0;
    }
    .cat-tab {
      padding: 6px 14px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      color: var(--cream-dim);
      background: transparent;
      transition: all 0.18s;
      font-family: 'DM Sans', sans-serif;
    }
    .cat-tab:hover { background: var(--bg-hover); color: var(--cream); }
    .cat-tab.active {
      background: linear-gradient(135deg, var(--gold), var(--saffron));
      color: #fff; border-color: transparent;
    }

    /* ── SEARCH ── */
    .search-wrap { padding: 14px 20px; position: relative; }
    .search-wrap .icon {
      position: absolute; left: 33px; top: 50%; transform: translateY(-50%);
      font-size: 0.9rem; color: var(--gold-dim); pointer-events: none;
    }
    .search-wrap .input { padding-left: 34px; }

    /* ── MENU GRID ── */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      padding: 4px 0 20px;
    }

    .menu-item-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; flex-direction: column; gap: 8px;
      position: relative; overflow: hidden;
    }
    .menu-item-card:hover {
      border-color: var(--gold);
      background: var(--bg-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(212,146,10,0.15);
    }
    .menu-item-card.in-order { border-color: var(--saffron); }
    .menu-item-card.in-order::after {
      content: '✓'; position: absolute; top: 10px; right: 10px;
      width: 20px; height: 20px;
      background: var(--saffron); color: #fff;
      border-radius: 50%; font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      text-align: center; line-height: 20px;
    }
    .item-emoji { font-size: 2rem; line-height: 3; }
    .item-name {
      font-weight: 600; color: var(--cream);
      font-size: 0.9rem; line-height: 1.3;
    }
    .item-desc { font-size: 0.74rem; color: var(--cream-dim); line-height: 1.5; }
    .item-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: auto;
    }
    .item-price { font-weight: 700; color: var(--gold-light); font-size: 1rem; }
    .item-add-btn {
      width: 28px; height: 28px; border-radius: 8px;
      background: linear-gradient(135deg, var(--gold), var(--saffron));
      border: none; color: #fff; font-size: 1.1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.18s;
    }
    .item-add-btn:hover { filter: brightness(1.15); transform: scale(1.1); }

    .no-results { text-align: center; padding: 60px 20px; color: var(--cream-dim); }
    .no-results .icon { font-size: 3rem; display: block; margin-bottom: 12px; }

    /* ── ORDER SIDEBAR ── */
    .order-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .order-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem; color: var(--gold-light);
    }
    .order-meta {
      padding: 12px 20px;
      display: flex; gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .order-items {
      flex: 1; overflow-y: auto;
      padding: 12px 20px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .order-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--cream-dim); text-align: center;
    }
    .order-empty .icon { font-size: 3rem; opacity: 0.4; }
    .order-empty p { font-size: 0.82rem; max-width: 180px; line-height: 1.6; }

    .order-row {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .order-row-name { flex: 1; font-size: 0.83rem; font-weight: 500; color: var(--cream); }
    .order-row-price { font-size: 0.83rem; color: var(--gold-light); font-weight: 600; min-width: 56px; text-align: right; }
    .qty-ctrl {
      display: flex; align-items: center; gap: 6px;
    }
    .qty-btn {
      width: 22px; height: 22px; border-radius: 6px;
      background: var(--bg-hover); border: 1px solid var(--border);
      color: var(--cream); font-size: 0.9rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .qty-btn:hover { background: var(--gold-dim); border-color: var(--gold); }
    .qty-val { min-width: 22px; text-align: center; font-weight: 700; font-size: 0.85rem; color: var(--cream); }

    /* ── TOTALS SECTION ── */
    .totals-section {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
    }
    .totals-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 0; font-size: 0.82rem;
    }
    .totals-row.main {
      padding: 10px 0 4px;
      border-top: 1px solid var(--border);
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; color: var(--gold-light);
    }
    .totals-row .lbl { color: var(--cream-dim); }
    .totals-row .val { font-weight: 600; }

    .pay-section {
      padding: 14px 20px 18px;
      display: flex; flex-direction: column; gap: 10px;
      border-top: 1px solid var(--border);
    }
    .pay-methods {
      display: flex; gap: 8px;
    }
    .pay-btn {
      flex: 1; padding: 8px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-deep);
      color: var(--cream-dim); font-size: 0.8rem; font-weight: 600;
      cursor: pointer; text-align: center;
      transition: all 0.18s;
      font-family: 'DM Sans', sans-serif;
    }
    .pay-btn:hover, .pay-btn.selected {
      background: var(--bg-hover);
      border-color: var(--gold);
      color: var(--gold-light);
    }

    .charge-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--gold), var(--saffron));
      border: none; border-radius: var(--radius-sm);
      color: #fff; font-size: 1rem; font-weight: 700;
      cursor: pointer; letter-spacing: 0.04em;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.18s;
    }
    .charge-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .charge-btn:disabled { opacity: 0.4; pointer-events: none; }

    /* ── RECEIPT MODAL ── */
    .receipt {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 18px;
      font-size: 0.82rem;
    }
    .receipt-title {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; color: var(--gold-light);
      margin-bottom: 14px;
    }
    .receipt-row {
      display: flex; justify-content: space-between;
      padding: 3px 0;
    }
    .receipt-divider { border: none; border-top: 1px dashed var(--border-strong); margin: 10px 0; }
    .receipt-total { font-weight: 700; color: var(--gold-light); font-size: 1rem; }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="topnav">
  <div class="brand">
    <div class="brand-icon">🍛</div>
    <div>
      <div class="brand-name">Curry House</div>
      <div class="brand-sub">Point of Sale</div>
    </div>
  </div>
  <div class="nav-links">
    <a href="index.html" class="nav-link active"><span class="icon">🧾</span> Order</a>
    <a href="menu.html"  class="nav-link"><span class="icon">🍽️</span> Menu</a>
    <a href="dashboard.html" class="nav-link"><span class="icon">📊</span> Dashboard</a>
  </div>
  <div class="nav-right">
    <div class="clock" id="clock"></div>
  </div>
</nav>

<div class="layout">

  <!-- ── MENU AREA ── -->
  <div class="main-area">

    <!-- Search -->
    <div class="search-wrap">
      <span class="icon">🔍</span>
      <input class="input" id="searchInput" type="text" placeholder="Search dishes…" />
    </div>

    <!-- Category Tabs -->
    <div class="cat-tabs" id="catTabs"></div>

    <!-- Grid -->
    <div style="padding: 16px 0 0;" id="menuGridWrap">
      <div class="menu-grid" id="menuGrid"></div>
    </div>

  </div>

  <!-- ── ORDER SIDEBAR ── -->
  <aside class="sidebar">

    <div class="order-header">
      <div>
        <div class="order-title">Current Order</div>
        <div style="font-size:0.74rem;color:var(--cream-dim);margin-top:2px;" id="orderItemCount">0 items</div>
      </div>
      <button class="btn btn-danger btn-sm" id="clearOrderBtn">Clear</button>
    </div>

    <div class="order-meta">
      <div class="input-group" style="flex:1">
        <label class="input-label">Table</label>
        <input class="input" id="tableInput" type="number" min="1" max="30" placeholder="No." />
      </div>
      <div class="input-group" style="flex:2">
        <label class="input-label">Customer</label>
        <input class="input" id="custInput" type="text" placeholder="Name (opt.)" />
      </div>
    </div>

    <div class="order-items" id="orderItems">
      <div class="order-empty">
        <span class="icon">🍽️</span>
        <p>No items yet. Select dishes from the menu to begin.</p>
      </div>
    </div>

    <div class="totals-section" id="totalsSection" style="display:none">
      <div class="totals-row"><span class="lbl">Subtotal</span><span class="val" id="tSubtotal">$0.00</span></div>
      <div class="totals-row"><span class="lbl">Service (10%)</span><span class="val" id="tService">$0.00</span></div>
      <div class="totals-row"><span class="lbl">Tax (15%)</span><span class="val" id="tTax">$0.00</span></div>
      <div class="totals-row main"><span>Total</span><span id="tTotal">$0.00</span></div>
    </div>

    <div class="pay-section">
      <div style="font-size:0.76rem;color:var(--cream-dim);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;">Payment Method</div>
      <div class="pay-methods">
        <button class="pay-btn selected" data-method="Cash">💵 Cash</button>
        <button class="pay-btn" data-method="Card">💳 Card</button>
        <button class="pay-btn" data-method="QR">📲 QR</button>
      </div>
      <button class="charge-btn" id="chargeBtn" disabled>Charge $0.00</button>
    </div>

  </aside>
</div>

<!-- RECEIPT MODAL -->
<div class="modal-overlay" id="receiptModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Order Confirmed 🎉</div>
      <button class="btn-icon" id="closeReceiptBtn">✕</button>
    </div>
    <div class="receipt" id="receiptBody"></div>
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="btn btn-outline" style="flex:1" id="printReceiptBtn">🖨️ Print</button>
      <button class="btn btn-gold" style="flex:1" id="newOrderBtn">+ New Order</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="app.js"></script>
<script>
  // ── STATE ──
  let menu       = loadMenu();
  let cart       = [];       // { ...menuItem, qty }
  let activeCat  = 'All';
  let payMethod  = 'Cash';
  let searchQ    = '';

  // ── INIT ──
  startClock(document.getElementById('clock'));
  renderCatTabs();
  renderMenu();

  // ── CATEGORY TABS ──
  function renderCatTabs() {
    const wrap = document.getElementById('catTabs');
    wrap.innerHTML = CATEGORIES.map(c => `
      <button class="cat-tab ${c === activeCat ? 'active' : ''}" data-cat="${c}">${c}</button>
    `).join('');
    wrap.querySelectorAll('.cat-tab').forEach(btn => {
      btn.onclick = () => {
        activeCat = btn.dataset.cat;
        renderCatTabs(); renderMenu();
      };
    });
  }

  // ── MENU GRID ──
  function renderMenu() {
    const grid = document.getElementById('menuGrid');
    let items = activeCat === 'All' ? menu : menu.filter(i => i.category === activeCat);
    if (searchQ) {
      const q = searchQ.toLowerCase();
      items = items.filter(i => i.name.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q));
    }
    if (!items.length) {
      grid.innerHTML = `<div class="no-results" style="grid-column:1/-1"><span class="icon">🍽️</span>No dishes found</div>`;
      return;
    }
    grid.innerHTML = items.map(item => {
      const inCart = cart.some(c => c.id === item.id);
      return `
        <div class="menu-item-card ${inCart ? 'in-order' : ''}" data-id="${item.id}">
          <div class="item-emoji">${item.emoji}</div>
          <div class="item-name">${item.name}</div>
          <div class="item-desc">${item.desc}</div>
          <div class="item-footer">
            <div class="item-price">${fmt(item.price)}</div>
            <button class="item-add-btn" data-id="${item.id}" title="Add to order">+</button>
          </div>
          <span class="badge badge-saffron" style="position:absolute;top:10px;left:10px;font-size:0.65rem;">${item.category}</span>
        </div>`;
    }).join('');

    grid.querySelectorAll('.item-add-btn').forEach(btn => {
      btn.onclick = e => { e.stopPropagation(); addToCart(parseInt(btn.dataset.id)); };
    });
    grid.querySelectorAll('.menu-item-card').forEach(card => {
      card.onclick = () => addToCart(parseInt(card.dataset.id));
    });
  }

  // ── CART ──
  function addToCart(id) {
    const item = menu.find(m => m.id === id);
    if (!item) return;
    const existing = cart.find(c => c.id === id);
    if (existing) { existing.qty++; }
    else { cart.push({ ...item, qty: 1 }); }
    renderCart(); renderMenu();
    showToast(`${item.name} added`, 'success');
  }

  function updateQty(id, delta) {
    const idx = cart.findIndex(c => c.id === id);
    if (idx === -1) return;
    cart[idx].qty += delta;
    if (cart[idx].qty <= 0) cart.splice(idx, 1);
    renderCart(); renderMenu();
  }

  function renderCart() {
    const container = document.getElementById('orderItems');
    const totalsEl  = document.getElementById('totalsSection');
    const chargeBtn = document.getElementById('chargeBtn');
    const countEl   = document.getElementById('orderItemCount');

    const totalQty = cart.reduce((s, i) => s + i.qty, 0);
    countEl.textContent = totalQty + ' item' + (totalQty !== 1 ? 's' : '');

    if (!cart.length) {
      container.innerHTML = `<div class="order-empty"><span class="icon">🍽️</span><p>No items yet. Select dishes from the menu to begin.</p></div>`;
      totalsEl.style.display = 'none';
      chargeBtn.disabled = true;
      chargeBtn.textContent = 'Charge $0.00';
      return;
    }

    container.innerHTML = cart.map(item => `
      <div class="order-row">
        <span style="font-size:1.1rem;">${item.emoji}</span>
        <div class="order-row-name">${item.name}</div>
        <div class="qty-ctrl">
          <button class="qty-btn" data-id="${item.id}" data-d="-1">−</button>
          <span class="qty-val">${item.qty}</span>
          <button class="qty-btn" data-id="${item.id}" data-d="1">+</button>
        </div>
        <div class="order-row-price">${fmt(item.price * item.qty)}</div>
      </div>
    `).join('');

    container.querySelectorAll('.qty-btn').forEach(btn => {
      btn.onclick = () => updateQty(parseInt(btn.dataset.id), parseInt(btn.dataset.d));
    });

    const { subtotal, tax, service, total } = calcOrderTotals(cart);
    document.getElementById('tSubtotal').textContent = fmt(subtotal);
    document.getElementById('tService').textContent  = fmt(service);
    document.getElementById('tTax').textContent      = fmt(tax);
    document.getElementById('tTotal').textContent    = fmt(total);
    totalsEl.style.display = 'block';
    chargeBtn.disabled = false;
    chargeBtn.textContent = `Charge ${fmt(total)}`;
  }

  // ── PAYMENT ──
  document.querySelectorAll('.pay-btn').forEach(btn => {
    btn.onclick = () => {
      payMethod = btn.dataset.method;
      document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
  });

  document.getElementById('clearOrderBtn').onclick = () => {
    if (!cart.length) return;
    cart = []; renderCart(); renderMenu();
    showToast('Order cleared');
  };

  document.getElementById('chargeBtn').onclick = () => {
    if (!cart.length) return;
    processOrder();
  };

  function processOrder() {
    const { subtotal, tax, service, total } = calcOrderTotals(cart);
    const tableNo = document.getElementById('tableInput').value || '—';
    const customer = document.getElementById('custInput').value || 'Walk-in';
    const orderId = generateOrderId();

    const order = {
      id: orderId,
      items: cart.map(i => ({ ...i })),
      subtotal, tax, service, total,
      tableNo, customer,
      payMethod,
      status: 'Completed',
      createdAt: new Date().toISOString(),
    };

    const orders = loadOrders();
    orders.push(order);
    saveOrders(orders);

    // Show receipt
    showReceipt(order);
  }

  function showReceipt(order) {
    const body = document.getElementById('receiptBody');
    const rows = order.items.map(i =>
      `<div class="receipt-row"><span>${i.emoji} ${i.name} ×${i.qty}</span><span>${fmt(i.price * i.qty)}</span></div>`
    ).join('');

    body.innerHTML = `
      <div class="receipt-title">🍛 Curry House</div>
      <div style="text-align:center;font-size:0.74rem;color:var(--cream-dim);margin-bottom:14px;">
        Order #${order.id} &nbsp;|&nbsp; Table ${order.tableNo} &nbsp;|&nbsp; ${new Date(order.createdAt).toLocaleTimeString()}
      </div>
      ${rows}
      <hr class="receipt-divider" />
      <div class="receipt-row"><span style="color:var(--cream-dim)">Subtotal</span><span>${fmt(order.subtotal)}</span></div>
      <div class="receipt-row"><span style="color:var(--cream-dim)">Service (10%)</span><span>${fmt(order.service)}</span></div>
      <div class="receipt-row"><span style="color:var(--cream-dim)">Tax (15%)</span><span>${fmt(order.tax)}</span></div>
      <hr class="receipt-divider" />
      <div class="receipt-row receipt-total"><span>TOTAL</span><span>${fmt(order.total)}</span></div>
      <div style="text-align:center;margin-top:14px;font-size:0.74rem;color:var(--cream-dim);">Paid via ${order.payMethod} &nbsp;•&nbsp; Thank you! 🙏</div>
    `;

    document.getElementById('receiptModal').classList.add('open');
  }

  document.getElementById('closeReceiptBtn').onclick =
  document.getElementById('newOrderBtn').onclick = () => {
    document.getElementById('receiptModal').classList.remove('open');
    cart = [];
    document.getElementById('tableInput').value = '';
    document.getElementById('custInput').value  = '';
    renderCart(); renderMenu();
    showToast('Ready for new order', 'success');
  };

  document.getElementById('printReceiptBtn').onclick = () => window.print();

  // ── SEARCH ──
  document.getElementById('searchInput').oninput = e => {
    searchQ = e.target.value.trim();
    renderMenu();
  };

  // ── INITIAL RENDER ──
  renderCart();
</script>
</body>
</html>
